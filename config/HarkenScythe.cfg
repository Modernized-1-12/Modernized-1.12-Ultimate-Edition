        # The maximum amount of essence to be stored in crucibles
        # Min: 1
        # Max: 2147483647
        I:"Crucible Max Amount"=100

        # The level of the regeneration effect provided by active livingmetal cores
        # Min: 1
        # Max: 2147483647
        I:"Livingmetal Core Regeneration Level"=1
